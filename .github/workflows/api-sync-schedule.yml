name: API Contract Scheduled Sync

# ──────────────────────────────────────────────
# 워크플로우 2: 매일 오전 9시 자동 동기화 + 변경 시 PR 생성
# ──────────────────────────────────────────────
on:
  schedule:
    # UTC 00:00 = KST 09:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: write
  pull-requests: write

jobs:
  scheduled-sync:
    name: Scheduled API Sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # PR 생성을 위해 쓰기 권한 토큰 사용
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure openapi-typescript
        run: |
          if ! npx --no openapi-typescript --version &>/dev/null 2>&1; then
            npm install --save-dev openapi-typescript
          fi

      - name: Snapshot current swagger.json (before sync)
        run: cp api-contract/swagger.json api-contract/swagger.json.before 2>/dev/null || true

      - name: Run API sync
        id: sync
        env:
          SWAGGER_URL: ${{ secrets.SWAGGER_URL }}
        run: |
          set +e
          ./scripts/sync-api.sh
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet api-contract/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: No changes — done
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ API 동기화 완료 — 변경사항 없음"

      - name: Prepare PR branch
        if: steps.diff.outputs.changed == 'true'
        id: branch
        run: |
          DATE=$(date '+%Y-%m-%d')
          BRANCH="chore/api-sync-${DATE}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add api-contract/
          git commit -m "chore: API 계약 동기화 [${DATE}]"
          git push origin "$BRANCH"

      - name: Read latest CHANGELOG entry
        if: steps.diff.outputs.changed == 'true'
        id: changelog
        run: |
          entry=$(awk '/^## /{if(found) exit; found=1} found{print}' api-contract/CHANGELOG.md | head -40)
          echo "entry<<EOF" >> "$GITHUB_OUTPUT"
          echo "$entry" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create sync PR
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = "${{ steps.branch.outputs.date }}";
            const branch = "${{ steps.branch.outputs.branch }}";
            const changelog = `${{ steps.changelog.outputs.entry }}`;

            const body = [
              "## 자동 생성 PR — API 계약 동기화",
              "",
              "스케줄러가 백엔드 Swagger의 변경을 감지해 자동으로 생성한 PR입니다.",
              "",
              "### 변경 내역",
              "```",
              changelog,
              "```",
              "",
              "### 머지 전 확인 사항",
              "- [ ] CHANGELOG에 기록된 변경 내역 검토",
              "- [ ] 영향받는 컴포넌트/훅 업데이트 여부 확인",
              "- [ ] `npm run validate` 통과 확인",
              "",
              "> 이 PR은 API Contract Scheduled Sync 워크플로우가 자동으로 생성했습니다."
            ].join("\n");

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: API 계약 동기화 [${date}]`,
              head: branch,
              base: "main",
              body
            });

            console.log(`PR 생성 완료: ${pr.data.html_url}`);
