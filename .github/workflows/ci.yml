name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 단일 진입점: npm run validate
      # 내부: typecheck → lint → format:check → layers → build
      # 로컬과 CI가 동일한 명령으로 동일한 검사를 수행합니다.
      - name: Validate
        run: npm run validate
        env:
          NEXT_PUBLIC_API_BASE_URL: https://jsonplaceholder.typicode.com
          NEXT_PUBLIC_APP_NAME: SSAC Frontend
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8080

  error-mapping-validation:
    name: ErrorCode Mapping Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Contract 파일(api-contract/error-contract.yml)과
      # FE 매핑 테이블(src/constants/errorMessages.ts)의 정합성을 검증합니다.
      # 누락 코드 또는 유령 코드 발견 시 빌드가 실패합니다.
      - name: ErrorCode 매핑 테이블 정합성 검증
        run: npm run validate:error-mapping
